<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TEST</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: Arial, sans-serif;
    }

    .video-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .video-container {
      flex: 1;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .cta-button {
      background-color: #e60000;
      color: white;
      font-size: 4vw; /* Responsif font */
      text-align: center;
      padding: 4vw 2vw;
      font-weight: bold;
      text-decoration: none;
      animation: pulse 2s infinite;
      word-wrap: break-word;
      line-height: 1.4;
      display: block;
    }

    @media (min-width: 768px) {
      .cta-button {
        font-size: 1.5rem;
        padding: 20px 10px;
      }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="video-wrapper">
    <div class="video-container">
      <iframe src="https://cdn.videy.co/j5yTytYC1.mp4" allowfullscreen></iframe>
    </div>
    <a class="cta-button" href="https://example.com/full-video" target="_blank">
      Watch the Full Video – Uncut & Exclusive 🔞
    </a>
  </div>
</body>
</html>
