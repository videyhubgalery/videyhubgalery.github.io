<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video dengan CTA di bawah</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
    }

    .video-container {
      max-width: 100%;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
    }

    video {
      width: 100%;
      height: auto;
      max-height: 90vh;
    }

    .cta-button {
      margin-top: 12px;
      background: red;
      color: white;
      font-weight: bold;
      font-size: 4vw;
      padding: 3vw 5vw;
      border-radius: 12px;
      text-align: center;
      text-decoration: none;
      animation: pulse 2s infinite;
      white-space: nowrap;
    }

    @media (min-width: 768px) {
      .cta-button {
        font-size: 1.2rem;
        padding: 12px 24px;
      }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="video-container">
    <video controls autoplay muted>
      <!-- <source src="https://cdn.videy.co/j5yTytYC1.mp4" type="video/mp4"> -->
      <source src="https://cdn.videy.co/dfUjvujb1.mp4" type="video/mp4">
      Browser Anda tidak mendukung tag video.
    </video>

    <a class="cta-button" href="https://example.com/full-video" target="_blank">
      Watch the Full Video – Uncut & Exclusive 🔞
    </a>
  </div>

</body>
</html>
