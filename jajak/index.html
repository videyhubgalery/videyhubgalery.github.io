<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Olivia Kate ● Rasta and playing with it , She pretty too.🎀🫶🏻💌💓</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .video-container {
      width: 100vw;
      background-color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    video {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      background-color: #000;
    }

    .watch-button {
      margin-top: 12px;
      padding: 12px 24px;
      font-size: 16px;
      color: #fff;
      background-color: #e60000;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      animation: pulse 1.6s infinite;
      transition: transform 0.3s, background-color 0.3s;
    }

    .watch-button:hover {
      transform: scale(1.08);
      background-color: #cc0000;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(230, 0, 0, 0.7); }
      70% { box-shadow: 0 0 0 12px rgba(230, 0, 0, 0); }
      100% { box-shadow: 0 0 0 0 rgba(230, 0, 0, 0); }
    }

    .ad-space {
      width: 300px;
      height: 50px;
      margin: 16px auto 20px;
      background-color: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <video 
      src="https://cdn.videy.co/j5yTytYC1.mp4" 
      autoplay 
      controls 
      playsinline 
      muted
    ></video>

    <!-- Tombol CTA dengan animasi -->
    <a href="#" class="watch-button">Watch the Full Video – Uncut & Exclusive 🔞</a>

    <!-- Iklan -->
    <div class="ad-space">300x50 Ad Space</div>
  </div>

</body>
</html>
