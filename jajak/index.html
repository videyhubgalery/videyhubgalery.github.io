<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Olivia Kate ● Rasta and playing with it , She pretty too.🎀🫶🏻💌💓</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .video-container {
      width: 100vw;
      background-color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    video {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      background-color: #000;
    }

    /* Animasi pulse */
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 rgba(230, 0, 0, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 12px rgba(230, 0, 0, 0.6); }
      100% { transform: scale(1); box-shadow: 0 0 0 rgba(230, 0, 0, 0.4); }
    }

    .watch-button {
      margin-top: 12px;
      padding: 12px 24px;
      font-size: 16px;
      color: #fff;
      background-color: #e60000;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      animation: pulse 1.8s infinite;
      transition: all 0.3s ease;
    }

    .watch-button:hover {
      box-shadow: 0 0 16px rgba(255, 0, 0, 0.8);
      transform: scale(1.08);
    }

    .ad-space {
      width: 300px;
      height: 50px;
      margin: 16px auto 20px;
      background-color: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 14px;
      color: #555;
    }

    /* Iklan atas dengan tombol X */
    .top-ad {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      padding: 10px;
    }

    .close-ad {
      position: absolute;
      top: -8px;
      right: -8px;
      background: red;
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Iklan atas tengah dengan tombol X -->
  <div class="top-ad" id="topAd">
    <button class="close-ad" onclick="document.getElementById('topAd').style.display='none'">×</button>
    <script async="async" data-cfasync="false" src="//bugscrawled.com/3772e1232d26dbb5b2f9b4ceeb2bbc0f/invoke.js"></script>
    <div id="container-3772e1232d26dbb5b2f9b4ceeb2bbc0f"></div>
  </div>

  <div class="video-container">
    <video 
      src="https://cdn.videy.co/j5yTytYC1.mp4" 
      autoplay 
      controls 
      playsinline 
      muted
    ></video>

    <a href="#" class="watch-button">Watch the Full Video – Uncut & Exclusive 🔞</a>

    <div class="ad-space">300x50 Ad Space</div>
  </div>

</body>
</html>
