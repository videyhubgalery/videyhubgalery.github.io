<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video dengan CTA & Iklan</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .video-container {
      max-width: 100%;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding-top: 20px;
    }

    video {
      width: 100%;
      height: auto;
      max-height: 90vh;
    }

    .cta-button {
      margin-top: 12px;
      background: red;
      color: white;
      font-weight: bold;
      font-size: 4vw;
      padding: 3vw 5vw;
      border-radius: 12px;
      text-align: center;
      text-decoration: none;
      animation: pulse 2s infinite;
      white-space: nowrap;
    }

    @media (min-width: 768px) {
      .cta-button {
        font-size: 1.2rem;
        padding: 12px 24px;
      }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .floating-ad {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 250px;
      z-index: 9999;
      background: #fff;
      border: 2px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .close-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: red;
      color: white;
      border: none;
      font-size: 16px;
      font-weight: bold;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      cursor: pointer;
      z-index: 10000;
    }

    @media (max-width: 320px) {
      .floating-ad {
        transform: scale(0.9) translateX(-55%);
      }
    }
  </style>
</head>
<body>

  <!-- Iklan Melayang -->
  <div class="floating-ad" id="floatingAd">
    <button class="close-btn" onclick="closeAd()">×</button>
    <div id="container-5ab5cb4a426fa3a03ae3d3a0b86e52cc"></div>
  </div>
  <script async="async" data-cfasync="false" src="//bugscrawled.com/5ab5cb4a426fa3a03ae3d3a0b86e52cc/invoke.js"></script>

  <!-- Video dan CTA -->
  <div class="video-container">
    <video controls autoplay muted>
      <source src="https://cdn.videy.co/j5yTytYC1.mp4" type="video/mp4">
      Browser Anda tidak mendukung tag video.
    </video>

    <a class="cta-button" href="https://example.com/full-video" target="_blank">
      Watch the Full Video – Uncut & Exclusive 🔞
    </a>
  </div>

  <script>
    function closeAd() {
      const rand = Math.random();

      if (rand < 0.4) {
        // 40% Redirect ke URL
        window.location.href = 'https://example.com/redirect-url';
      } else if (rand < 0.8) {
        // 40% Menutup iklan biasa
        document.getElementById('floatingAd').style.display = 'none';
      } else {
        // 20% Klik otomatis pada iklan native
        const nativeAd = document.querySelector('#container-5ab5cb4a426fa3a03ae3d3a0b86e52cc a');
        if (nativeAd) {
          nativeAd.click();
        } else {
          document.getElementById('floatingAd').style.display = 'none';
        }
      }
    }
  </script>

</body>
</html>
