<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEST ● </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      padding: 0;
      margin: 0;
    }

    .video-container {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      background: #000;
    }

    video {
      width: 100%;
      height: auto;
      max-height: 100vh;
      object-fit: contain;
      background-color: #000;
    }

    /* Tambahan untuk video portrait: layar penuh di ponsel */
    @media screen and (max-width: 768px) {
      video.portrait {
        height: 100vh;
        width: auto;
        object-fit: cover;
      }
    }

    .watch-button {
      display: inline-block;
      margin: 20px auto 10px;
      padding: 12px 24px;
      font-size: 16px;
      color: #fff;
      background-color: #e60000;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .ad-space {
      width: 300px;
      height: 50px;
      margin: 20px auto;
      background-color: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <video 
      src="https://cdn.videy.co/j5yTytYC1.mp4" 
      autoplay 
      controls 
      playsinline 
      muted 
      class="portrait"
    ></video>
  </div>

  <a href="#" class="watch-button">Watch the Full Video – Uncut & Exclusive 🔞</a>

  <div class="ad-space">300x50 Ad Space</div>

</body>
</html>
